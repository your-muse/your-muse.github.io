<div id="registerModal" class="modal">
  <div class="modal-content">
    <video src="register.mp4" autoplay muted loop playsinline></video>
    <p class="modal-title">Register Now:</p>
    <button class="modal-btn" onclick="window.open('https://forms.gle/onyNcbw8WFsRd62L9','_blank')">Subscribe with Email</button>
    <button class="modal-btn continue" onclick="continueWithoutRegistering()">Continue Without Registering</button>
  </div>
</div>

<script>
  function openModal(e) {
    if (e) e.preventDefault();
    document.getElementById("registerModal").style.display = "flex";
  }

  function continueWithoutRegistering() {
    document.getElementById("registerModal").style.display = "none";
  }

  function toggleLike(btn) {
    const dislikeBtn = document.querySelectorAll('.icon-btn')[2];
    btn.classList.toggle("active");
    btn.querySelector("i").classList.toggle("fa-regular");
    btn.querySelector("i").classList.toggle("fa-solid");
    dislikeBtn.classList.remove("active");
    dislikeBtn.querySelector("i").classList.remove("fa-solid");
    dislikeBtn.querySelector("i").classList.add("fa-regular");
  }

  function toggleDislike(btn) {
    const likeBtn = document.querySelectorAll('.icon-btn')[1];
    btn.classList.toggle("active");
    btn.querySelector("i").classList.toggle("fa-regular");
    btn.querySelector("i").classList.toggle("fa-solid");
    likeBtn.classList.remove("active");
    likeBtn.querySelector("i").classList.remove("fa-solid");
    likeBtn.querySelector("i").classList.add("fa-regular");
  }

  function sharePost() {
    if (navigator.share) {
      navigator.share({ title: document.title, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      alert("Link copied.");
    }
  }
</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://brhvefwrpmstpujslhei.supabase.co",
  "sb_publishable_0JjjCWLxQ0QBJi0_CKyZzQ_zPhUtikL"
);

const ARTICLE_ID = "article-2"; // change per page

async function loadLikes() {
  const { data } = await supabase
    .from("Likes")
    .select("likes_count")
    .eq("article_id", ARTICLE_ID)
    .single();

  if (data) {
    document.getElementById("like-count").innerText = data.likes_count;
  }
}

async function handleLike(btn) {
  let countEl = document.getElementById("like-count");
  let current = parseInt(countEl.innerText);

  const { data } = await supabase
    .from("Likes")
    .update({ likes_count: current + 1 })
    .eq("article_id", ARTICLE_ID)
    .select()
    .single();

  if (data) {
    countEl.innerText = data.likes_count;
  }

  btn.classList.add("active");
}

document.addEventListener("DOMContentLoaded", loadLikes);
</script>
